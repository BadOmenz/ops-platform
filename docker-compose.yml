services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ops_platform
      POSTGRES_USER: ops_platform
      POSTGRES_PASSWORD: ops_platform
    ports:
      - "5435:5432"
    volumes:
      - ops_platform_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops_platform -d ops_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ops_platform_pgdata:

