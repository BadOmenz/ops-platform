name: frontend ci

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  frontend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: set up node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install dependencies
        run: |
          npm install

      - name: build frontend
        run: |
          npm run build